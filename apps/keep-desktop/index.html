<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keep Clipboard</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <span class="brand">Keep Clipboard</span>
        <span id="status-dot" class="dot dot--off" title="disconnected"></span>
      </header>

      <!-- Disconnected view -->
      <section id="view-connect" class="view">
        <p class="muted">
          <span id="connect-copy">Connect this device to Keep Clipboard.</span>
        </p>
        <button id="connect-btn" class="primary">
          Connect this <span id="platform-copy">device</span>
        </button>
        <p id="connect-hint" class="hint"></p>
      </section>

      <!-- Connected view -->
      <section id="view-main" class="view hidden">
        <div class="statusline">
          <span id="device-name" class="device"></span>
          <label class="toggle">
            <input type="checkbox" id="pause-toggle" />
            <span>Pause</span>
          </label>
        </div>
        <div id="desktop-controls" class="statusline statusline--sub">
          <label class="toggle">
            <input type="checkbox" id="autostart-toggle" />
            <span>Start at login</span>
          </label>
          <button id="signout-btn" class="link">Sign out</button>
        </div>
        <section id="mobile-compose" class="compose hidden">
          <label for="manual-text" class="section-title">Share to Keep</label>
          <textarea
            id="manual-text"
            rows="3"
            placeholder="Paste or share text here"
          ></textarea>
          <button id="manual-send" class="primary">Send to Keep</button>
        </section>
        <div class="section-heading">
          <h2 class="section-title">Clipboard history</h2>
          <button id="refresh-btn" class="link">Refresh</button>
        </div>
        <ul id="history" class="recent"></ul>
        <h2 class="section-title">Recently sent by this device</h2>
        <ul id="recent" class="recent"></ul>
      </section>
    </main>
  </body>
</html>
