name: Release VS Code extension

# Publishes apps/vscode-extension to the VS Code Marketplace (and Open VSX, if
# configured). Two ways to trigger:
#
#   1. Run this workflow manually (Actions → Release VS Code extension → Run) —
#      the recommended path. No manual version bump needed.
#   2. Push a tag `vscode-v*`.
#
# Marketplace versions are immutable, so this workflow AUTO-INCREMENTS the patch
# version until it finds a free one, publishes it, then commits the resulting
# package.json bump back to the default branch. So each run just publishes the
# next patch (e.g. 0.4.0 taken → 0.4.1).
#
# Channel follows the repo convention in apps/vscode-extension/scripts/release.sh:
# an ODD minor (0.5.x) publishes to the pre-release channel, an EVEN minor (0.4.x)
# to stable. `workflow_dispatch` can override this with the `channel` input. To
# switch channel or bump minor/major, edit package.json first — CI only moves the
# patch.
#
# Required secret (scoped to the `vscode-release` environment or the repo):
#   VSCE_PAT  — Azure DevOps PAT for the "keep" publisher, Marketplace: Manage.
# Optional:
#   OVSX_PAT  — Open VSX token; when set, the build is mirrored there too.

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Marketplace channel
        required: true
        type: choice
        options:
          - auto
          - pre-release
          - stable
        default: auto
      ref:
        description: Tag or ref to publish (defaults to the triggering ref)
        required: false
        type: string
  push:
    tags:
      - "vscode-v*"

# Needed so the workflow can commit the auto-incremented version back.
permissions:
  contents: write

concurrency:
  group: vscode-release
  cancel-in-progress: false

env:
  PUBLISH_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref != '' && inputs.ref || github.ref_name }}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: vscode-release
    defaults:
      run:
        working-directory: apps/vscode-extension
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.PUBLISH_REF }}
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Resolve channel
        id: meta
        shell: bash
        env:
          CHANNEL_INPUT: ${{ inputs.channel }}
        run: |
          version="$(node -p "require('./package.json').version")"
          channel="${CHANNEL_INPUT:-auto}"
          if [ "$channel" = "auto" ]; then
            minor="$(echo "$version" | cut -d. -f2)"
            if [ $((minor % 2)) -eq 1 ]; then channel="pre-release"; else channel="stable"; fi
          fi
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "Starting from v${version}; publishing to the ${channel} channel."

      - name: Verify (lint, typecheck, test, build)
        run: |
          pnpm run lint
          pnpm run typecheck
          pnpm run test
          pnpm run build

      - name: Package and publish (auto-increment on conflict)
        id: publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "${VSCE_PAT:-}" ]; then
            echo "VSCE_PAT is not set. Add it to the 'vscode-release' environment (Marketplace: Manage PAT for the 'keep' publisher)." >&2
            exit 1
          fi

          flag=""
          [ "${{ steps.meta.outputs.channel }}" = "pre-release" ] && flag="--pre-release"

          attempts=0
          while : ; do
            version="$(node -p "require('./package.json').version")"
            vsix="keep-vscode-${version}.vsix"

            # The channel is baked into the package here; publishing the packaged
            # .vsix by path must NOT repeat --pre-release.
            pnpm exec vsce package $flag --no-dependencies -o "$vsix"

            set +e
            out="$(pnpm exec vsce publish --no-dependencies --packagePath "$vsix" 2>&1)"
            code=$?
            set -e
            printf '%s\n' "$out"

            if [ "$code" -eq 0 ]; then
              echo "version=$version" >> "$GITHUB_OUTPUT"
              echo "vsix=$vsix" >> "$GITHUB_OUTPUT"
              echo "✔ Published v${version} to the ${{ steps.meta.outputs.channel }} channel."
              break
            fi

            if printf '%s' "$out" | grep -qi "already exists"; then
              attempts=$((attempts + 1))
              if [ "$attempts" -ge 25 ]; then
                echo "Gave up after $attempts version bumps — check the Marketplace state." >&2
                exit 1
              fi
              rm -f "$vsix"
              npm version patch --no-git-tag-version >/dev/null
              echo "v${version} is already on the Marketplace — bumped to $(node -p "require('./package.json').version") and retrying."
              continue
            fi

            echo "Publish failed for a reason other than a version conflict." >&2
            exit "$code"
          done

      - name: Mirror to Open VSX (optional)
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "${OVSX_PAT:-}" ]; then
            echo "OVSX_PAT not set — skipping Open VSX mirror."
            exit 0
          fi
          pnpm dlx ovsx publish "${{ steps.publish.outputs.vsix }}" -p "$OVSX_PAT"

      - name: Commit the version bump back to the default branch
        working-directory: .
        env:
          NEW_VERSION: ${{ steps.publish.outputs.version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$DEFAULT_BRANCH"
          # -f discards the working-tree package.json the publish loop bumped; the
          # published version is re-applied cleanly on top of the default branch.
          git checkout -f -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"
          npm --prefix apps/vscode-extension version "$NEW_VERSION" \
            --no-git-tag-version --allow-same-version >/dev/null
          if git diff --quiet -- apps/vscode-extension/package.json; then
            echo "package.json already at v$NEW_VERSION — nothing to commit."
            exit 0
          fi
          git add apps/vscode-extension/package.json
          git commit -m "chore(vscode): publish v$NEW_VERSION [skip ci]"
          git push origin "HEAD:$DEFAULT_BRANCH" \
            || echo "::warning::Published v$NEW_VERSION but could not push the bump (branch protection?). Set apps/vscode-extension/package.json to $NEW_VERSION manually."

      - uses: actions/upload-artifact@v4
        with:
          name: keep-vscode-${{ steps.publish.outputs.version }}
          path: apps/vscode-extension/${{ steps.publish.outputs.vsix }}
          if-no-files-found: error
