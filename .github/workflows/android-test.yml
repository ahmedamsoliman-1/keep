name: Android signed test APK

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build signed universal APK
    runs-on: ubuntu-latest
    environment: native-release
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Android SDK components
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "ndk;27.2.12479018"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Android release keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is not configured" >&2
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/keep-android-release.jks"
          chmod 600 "$RUNNER_TEMP/keep-android-release.jks"

      - name: Build signed universal APK
        working-directory: apps/keep-desktop
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/keep-android-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: pnpm tauri android build --apk --ci

      - name: Verify and name APK
        shell: bash
        run: |
          source_apk="apps/keep-desktop/src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release.apk"
          test -f "$source_apk"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs "$source_apk"
          mkdir -p artifacts
          cp "$source_apk" artifacts/Keep-Clipboard-Android-universal.apk
          shasum -a 256 artifacts/Keep-Clipboard-Android-universal.apk > artifacts/Keep-Clipboard-Android-universal.apk.sha256

      - name: Upload private test APK
        uses: actions/upload-artifact@v4
        with:
          name: Keep-Clipboard-Android-signed-${{ github.run_number }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14
