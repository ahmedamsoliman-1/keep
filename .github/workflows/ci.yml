name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
